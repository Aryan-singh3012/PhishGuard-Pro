<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhishGuard Mobile</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #0f172a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .app-container { width: 90%; max-width: 400px; background: #1e293b; padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; border: 1px solid #334155; }
        h1 { color: #3b82f6; font-size: 24px; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        textarea { width: 100%; height: 100px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; padding: 12px; font-size: 16px; box-sizing: border-box; resize: none; margin-bottom: 20px; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #3b82f6; color: white; font-weight: bold; font-size: 16px; transition: 0.2s; }
        button:active { transform: scale(0.98); background: #2563eb; }
        #result { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; font-weight: 600; font-size: 14px; line-height: 1.5; }
        .danger { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }
        .safe { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid #10b981; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>🛡️ PhishGuard</h1>
        <p>Paste a WhatsApp message or link below to scan for threats.</p>
        
        <textarea id="input" placeholder="Paste message here..."></textarea>
        
        <button onclick="scanNow()" id="scanBtn">Analyze Message</button>

        <div id="result"></div>
    </div>

    <script>
        async function scanNow() {
            const text = document.getElementById('input').value;
            const resDiv = document.getElementById('result');
            const btn = document.getElementById('scanBtn');

            if (!text) return;

            btn.innerText = "Scanning Cloud AI...";
            resDiv.style.display = "none";

            try {
                // This connects directly to your Live Render Brain
                const response = await fetch('https://phishguard-pro-1.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, source: "mobile_web" })
                });

                const data = await response.json();
                btn.innerText = "Analyze Message";
                resDiv.style.display = "block";

                if (data.status === "PHISHING") {
                    resDiv.className = "danger";
                    resDiv.innerHTML = "🚨 THREAT DETECTED!<br>" + data.reasons;
                    if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
                } else {
                    resDiv.className = "safe";
                    resDiv.innerHTML = "✅ LINK IS SECURE<br>" + data.reasons;
                }
            } catch (err) {
                btn.innerText = "Analyze Message";
                alert("Cloud Brain is waking up... please try again in 10 seconds.");
            }
        }
    </script>
</body>
</html>
